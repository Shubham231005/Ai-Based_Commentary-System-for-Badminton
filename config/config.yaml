# ============================================================
# Antigravity — Event-Driven Sports Commentary Engine Config
# ============================================================

# Video Processing
video:
  fps: 10               # Frames per second to extract (lower = faster, less accurate)
  resolution: 720        # Resize target height in pixels
  max_duration: 120      # Max video duration in seconds to process

# Vision Layer
vision:
  yolo_model: "yolov8n.pt"     # Nano model for CPU efficiency
  confidence_threshold: 0.35   # Lower threshold to catch fast-moving objects
  player_confidence: 0.5       # Higher threshold for person detection
  iou_threshold: 0.45          # NMS IoU threshold
  device: "cpu"                # Force CPU mode

# Tracker
tracker:
  max_disappeared: 15      # Frames before deregistering a lost object
  max_distance: 80         # Max pixel distance for centroid matching
  court_top_ratio: 0.5     # Y-ratio dividing court into Player A (top) / Player B (bottom)

# Court Geometry (will be auto-detected or manually set)
court:
  # Approximate court boundary as fraction of frame dimensions
  left: 0.15
  right: 0.85
  top: 0.05
  bottom: 0.95
  net_y: 0.5               # Approximate Y-position of the net (fraction)

# Event Detection Rules
event_rules:
  smash:
    min_velocity: 12.0          # Min shuttle velocity (pixels/frame) for 360p
    max_angle_from_vertical: 45 # Degrees from vertical (downward)
    enabled: true

  long_rally:
    min_hit_count: 8            # Minimum direction reversals for long rally
    enabled: true

  drop_shot:
    max_velocity: 8.0           # Max shuttle velocity for drop shot
    min_angle_from_vertical: 30 # Must be somewhat steep
    net_proximity: 0.15         # Must be within this fraction of net Y
    enabled: true

  point_won:
    stationary_frames: 15       # Frames shuttle must be still (higher to avoid false positives)
    min_rally_hits: 1           # Minimum hits before a point can be scored
    enabled: true

  rally_start:
    serve_motion_threshold: 10  # Min player arm/body displacement to detect serve
    enabled: true

# Intensity Scoring Weights
intensity:
  rally_length_weight: 0.35
  velocity_weight: 0.30
  player_movement_weight: 0.20
  proximity_weight: 0.15
  thresholds:
    low: 0.25
    medium: 0.50
    high: 0.75
    # Anything above 0.75 = "maximum"

# Badminton Sport Config
sport:
  name: "badminton"
  type: "singles"
  scoring: "rally_point"   # Modern badminton scoring
  max_points: 21
  events:
    - "rally_start"
    - "smash"
    - "drop_shot"
    - "long_rally"
    - "point_won"
    - "out_of_bounds"

# Output
output:
  timeline_file: "event_timeline.json"
  debug_frames: false           # Save annotated frames for visual debugging
  debug_frames_dir: "debug_frames"

# Text-to-Speech (Phase 3)
tts:
  provider: "elevenlabs"       # elevenlabs | gtts
  google:
    language_code: "en-US"
    voice_name: "en-US-Neural2-J"
    speaking_rate: 1.1
    pitch: 0.0
  elevenlabs:
    voice_a_id: "pNInz6obpgDQGcFmaJgB"   # Male — Adam (free-tier pre-made)
    voice_b_id: "21m00Tcm4TlvDq8ikWAM"   # Female — Rachel (free-tier pre-made)
    model_id: "eleven_multilingual_v2"
    stability: 0.45             # Lower = more expressive/emotional
    similarity_boost: 0.80
    style: 0.65                 # Higher = more emotional delivery

# Audio Mixing (Phase 3)
audio:
  commentary_volume: 0.8
  background_volume: 0.3
  ducking_enabled: true

# Commentary (Phase 2)
commentary:
  enabled: true
  persona: "hinglish_excited"    # hinglish_excited | analytical | casual
  language: "hinglish"           # hinglish | english
  model: "gemini-2.0-flash"     # Gemini model to use
  temperature: 0.85              # Higher = more creative/varied
  include_match_summary: true    # Generate end-of-match summary


# Performance
performance:
  cache_events: true
  batch_size: 32          # Frames to batch for YOLO inference
  log_interval: 200       # Log progress every N frames
